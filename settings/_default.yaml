display_name: "Generic / fallback"
patterns: []

max_context: 8192
recommended_kv_quant: q8_0

# Sampling-Profile pro Modus.
# Die GUI-Dropdown wählt zwischen "chat" (default) und "coding".
sampling:
  chat:
    temperature: 0.7
    top_k: 40
    top_p: 0.95
    min_p: 0.05
    repeat_penalty: 1.05
  coding:
    temperature: 0.2
    top_k: 40
    top_p: 0.9
    min_p: 0.05
    repeat_penalty: 1.05

notes: >
  Fallback-Profil. Falls kein spezifisches Profil passt, wird dieses verwendet.
  Chat-Defaults sind bewusst konservativ-mittig (temp 0.7), Coding deutlich
  deterministischer (temp 0.2). Modell-spezifische YAMLs überschreiben das.
