# Fallback profile — used when no other YAML matches the model filename.
# Profiles with empty `patterns:` are treated as the fallback.
display_name: "Generic / fallback"
patterns: []

max_context: 8192
recommended_kv_quant: q8_0

sampling:
  temperature: 0.7
  top_k: 40
  top_p: 0.95
  min_p: 0.05
  repeat_penalty: 1.05

notes: >
  Conservative defaults. Add a YAML file for your model family to get
  better sampling and a higher max_context.
