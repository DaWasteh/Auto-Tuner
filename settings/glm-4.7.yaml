display_name: "GLM-4.7 / GLM-4.7-Flash (Z.ai)"
patterns:
  - glm-4.7
  - glm4.7

# GLM-4.7 (358B MoE / 32B aktiv): 200k Input + 128k Output.
# GLM-4.7-Flash (30B MoE / 3B aktiv): bis 200k mit MLA.
# Native context wird via GGUF-Metadata automatisch je Variante gecappt.
max_context: 202752
recommended_kv_quant: q8_0

sampling:
  # Z.ai empfiehlt Temp 1.0 für Chat, für Coding/Tools eher 0.7.
  temperature: 1.0
  top_k: 40
  top_p: 0.95
  # Unsloth empfiehlt min_p 0.01 statt dem llama.cpp Standard 0.05
  min_p: 0.01
  # Sehr wichtig: GLM-Modelle mögen keine Repeat Penalty (1.0 = aus)
  repeat_penalty: 1.0

extra_args:
  # Ohne --jinja funktioniert das Chat-Template bei GLM-4.7 oft nicht
  # korrekt (Preserved Thinking / Interleaved Thinking schmieren ab).
  - --jinja

notes: >
  Flagship 358B MoE Coding-Modell oder 30B-Flash-Variante. Drei-stufige
  Thinking-Architektur (Interleaved/Preserved/Standard). Sehr stark in
  SWE-Bench (~73.8% beim Full-Modell, 59.2% beim Flash) und Tool-Use.
  Benötigt zwingend --jinja für korrekte Formattierung. Falls das Modell
  zu "kreativ" wird, Temperature auf 0.7 senken.
  Tipp: Für Coding `thinking=enabled` setzen — interne Reasoning-Traces
  verbessern Code-Qualität spürbar.