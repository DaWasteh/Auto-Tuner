display_name: "DeepSeek (V3.2 / R1 Reasoning)"
patterns:
  - deepseek-v3
  - deepseek-r1
  - deepseek-v3.2

# V3.1-Terminus / V3.2 wurden auf 128k erweitert (vorher 64k).
# DSA (DeepSeek Sparse Attention) hilft bei Long-Context.
max_context: 131072
recommended_kv_quant: q8_0

# Sampling-Profile pro Modus.
sampling:
  chat:
    # Offizielle DeepSeek-Empfehlung für lokales Deployment (V3.2 HF Card):
    # "We recommend setting the sampling parameters to temperature = 1.0,
    # top_p = 0.95." Die offizielle DeepSeek-App selbst nutzt für R1
    # intern temp=0.6 - 1.0 ist die obere Schranke der Empfehlung.
    temperature: 1.0
    top_k: 50
    top_p: 0.95
    min_p: 0.05
    repeat_penalty: 1.0
  coding:
    # DeepSeek-R1 Bench-Setup laut HF-Card: temp=0.6, top_p=0.95.
    # Dieser Wert wird auch in der offiziellen App (chat.deepseek.com)
    # verwendet. Für deterministische Coding-Tasks ist das die Referenz.
    temperature: 0.6
    top_k: 50
    top_p: 0.95
    min_p: 0.05
    repeat_penalty: 1.0

extra_args:
  # Ohne --jinja landen die <think>-Blöcke der R1-Modelle im content-Feld
  # statt sauber als reasoning_content getrennt zu werden.
  - --jinja

notes: >
  DeepSeek-V3.2 (671B MoE / 37B aktiv) mit DSA für effiziente long-context
  attention, oder R1 (Reasoning). Die R1- und V3.2-Modelle nutzen
  <think>-Tags für Chain-of-Thought.
  Chat-Profil = offizielle V3.2 Empfehlung (temp=1.0). Coding-Profil
  = offizielles R1 Bench-Setup (temp=0.6) und gleichzeitig der Wert
  den die DeepSeek-App selbst nutzt.
  ACHTUNG: Speciale-Variante (V3.2-Speciale) unterstützt KEIN Tool-Calling
  - sie ist explizit nur für deep-reasoning-Tasks ausgelegt.
