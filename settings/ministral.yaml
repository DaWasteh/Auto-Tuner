display_name: "Ministral 3 (Mistral, reasoning)"
patterns:
  - ministral

# Mistral docs: Ministral 3 (3B/8B/14B) hat 256k Kontext, alle Varianten.
# vLLM-Default ist 262144.
max_context: 262144
recommended_kv_quant: q8_0

# Sampling-Profile pro Modus.
sampling:
  chat:
    # Mistral's offizielle Empfehlung für die Reasoning-Variante:
    # "Use a temperature of 1 for most environments" (HF GGUF Card).
    # Für die Instruct-Variante würde Mistral <0.1 empfehlen - falls
    # dein Model-Filename "Instruct" enthält statt "Reasoning", den
    # Coding-Modus verwenden oder per CLI überschreiben.
    temperature: 1.0
    top_k: 40
    top_p: 0.95
    min_p: 0.05
    repeat_penalty: 1.0
  coding:
    # Für Coding-Tasks UND für die Instruct-Varianten von Ministral 3.
    # Mistral nennt für Instruct <0.1 als Default - 0.15 ist der
    # praktische Sweet-Spot zwischen Determinismus und brauchbarer
    # Output-Vielfalt.
    temperature: 0.15
    top_k: 40
    top_p: 0.95
    min_p: 0.05
    repeat_penalty: 1.0

notes: >
  Ministral 3 (3B/8B/14B), Mistrals Edge-Familie, alle mit Vision (mmproj).
  14B Reasoning ist vergleichbar mit Mistral Small 3.2 24B in Reasoning-
  Benchmarks (85% AIME '25). Architektur teilt RoPE-Scaling mit Devstral
  Small 2 / Llama 4. Apache 2.0.
  Chat-Profil = Reasoning-Variante (temp 1.0, Mistral-Empfehlung).
  Coding-Profil passt auch für die Instruct-Varianten (temp ~0.1).
  Hinweis: Pattern matched alle Varianten - bei Instruct-Modellen
  einfach den Coding-Modus auch für Chat verwenden, oder per CLI
  überschreiben:  -- --temp 0.0
