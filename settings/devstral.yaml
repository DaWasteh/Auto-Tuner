display_name: "Devstral (Mistral, code)"
patterns:
  - devstral

max_context: 262144
recommended_kv_quant: q8_0

# Sampling-Profile pro Modus.
# Devstral ist ein Coding-spezialisiertes Modell, daher ist "coding"
# der Fokus. Das chat-Profil ist hier explizit "Devstral als Conversational
# Coding-Assistant" — etwas mehr Spielraum als der harte Completion-Modus.
sampling:
  chat:
    # Etwas weniger deterministisch für Erklärungen, Diskussion über
    # Code, Refactoring-Vorschläge — aber immer noch konservativ
    # weil Devstral primär codet.
    temperature: 0.4
    top_k: 40
    top_p: 0.9
    min_p: 0.05
    repeat_penalty: 1.05
  coding:
    # Niedrig für deterministische Code-Completion. Original-Wert
    # aus dem alten Flat-Profil.
    temperature: 0.15
    top_k: 40
    top_p: 0.9
    min_p: 0.05
    repeat_penalty: 1.05

notes: >
  Optimiert für Code-Completion (Cline, Aider, VS Code).
  Coding-Profil (temp=0.15) für deterministische Completion;
  Chat-Profil (temp=0.4) für Code-Erklärungen und Diskussion.