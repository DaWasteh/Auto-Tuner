# Qwen3 family (Qwen3.5, Qwen3.6, including MoE A3B variants and
# uncensored / abliterated finetunes that keep the same name prefix).
display_name: "Qwen3 (Alibaba)"
patterns:
  - qwen3
  - qwen3.5
  - qwen3.6

# Qwen3 supports 128k natively (RoPE-extended). The actual usable
# context is bounded by RAM/VRAM; the auto-tuner will clamp to fit.
max_context: 131072
recommended_kv_quant: q8_0

sampling:
  # Recommended Qwen3 instruct/chat settings.
  temperature: 0.7
  top_k: 20
  top_p: 0.8
  min_p: 0.0
  repeat_penalty: 1.05

notes: >
  For "thinking mode" prompts, lower temperature to ~0.6 and top_p to ~0.95.
  For abliterated/uncensored variants the same sampling works fine.
