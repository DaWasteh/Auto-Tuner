display_name: "Qwen 2.5 / 3 (Alibaba)"
patterns:
  - qwen-2.5
  - qwen-3
  - qwen2.5
  - qwen3-coder

max_context: 131072
recommended_kv_quant: q8_0

# RoPE-Scaling (YaRN): Optional aktivierbar wenn genügend Speicher frei ist
# und der berechnete Context das native Limit überschreitet.
rope_scale:
  enabled: false       # Standard aus — User kann in GUI aktivieren
  max_context: 1048576  # 1M tokens mit YaRN möglich
  scale_factor: 4.0     # yarn scaling factor (4x für Qwen3.5/3.6)

# Sampling-Profile pro Modus.
sampling:
  chat:
    # Generischer Allround-Default, funktioniert quer durch die Familie
    # (Instruct, Chat, VL). Kein offizieller Qwen-2.5-Empfehlungswert
    # bekannt — das hier ist die alte Flat-Konfiguration.
    temperature: 0.7
    top_k: 40
    top_p: 0.9
    min_p: 0.05
    repeat_penalty: 1.05
  coding:
    # Qwen3-Coder und die Qwen2.5-Coder-Varianten profitieren stark
    # von niedriger Temperatur — siehe Notes-Tipp im alten Profil.
    # 0.2 ist der Mittelweg zwischen "deterministic" (0.1) und
    # "etwas Kreativität bei Algorithmus-Suche" (0.3).
    temperature: 0.2
    top_k: 40
    top_p: 0.9
    min_p: 0.05
    repeat_penalty: 1.05

notes: >
  Hervorragendes Allround-Modell. Coding-Profil läuft mit temp=0.2
  (vs. 0.7 chat) — die Coder-Varianten können auch mit noch niedrigerer
  Temperatur (0.1) betrieben werden. Über GUI-Mode auswählbar.