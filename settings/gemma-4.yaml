display_name: "Gemma 4 (Google)"
patterns:
  - gemma-4
  - gemma4

# Vier Größen (April 2026): E2B, E4B, 26B-A4B (MoE), 31B (Dense).
# E2B/E4B unterstützen 131072 (128k); 26B-A4B und 31B bis 262144 (256k).
# Wird automatisch via GGUF-Metadata (native_context) je nach Modell
# heruntergeregelt - daher hier den größten Wert eintragen.
max_context: 262144
recommended_kv_quant: q8_0

# RoPE-Scaling (YaRN): Optional aktivierbar wenn genügend Speicher frei ist
# und der berechnete Context das native Limit überschreitet.
rope_scale:
  enabled: false        # Standard aus — User kann in GUI aktivieren
  max_context: 524288   # 0.5M tokens mit YaRN möglich
  scale_factor: 4.0     # 4x für E2B/E4B (128k→512k), 2x für 26B-A4B/31B (256k→512k)


# Zwingend erforderlich für MTP-Support (gemma4_mtp Architektur).
# Google hat MTP-Drafter für ALLE vier Größen released (E2B, E4B,
# 26B-A4B, 31B) - bis zu 3x End-to-End-Speedup über Speculative Decoding.
server_binary: "ik_llama/llama-server"

# Sampling-Profile pro Modus.
sampling:
  chat:
    # Google's offizielle Empfehlung über alle Größen hinweg.
    temperature: 1.0
    top_k: 64
    top_p: 0.95
    min_p: 0.0
    repeat_penalty: 1.0   # Gemma reagiert schlecht auf >1.0
  coding:
    # Konservativeres Coding-Default. Community-Tests zeigen, dass Gemma 4
    # auch mit höheren Temperaturen für Coding gut funktioniert (manche
    # berichten temp=1.5 als optimal für Coding-Tasks!) - aber als
    # konservativer Default ist 0.7 sicherer und immer noch im offiziellen
    # Empfehlungs-Korridor.
    temperature: 0.7
    top_k: 64
    top_p: 0.95
    min_p: 0.0
    repeat_penalty: 1.0

# MTP (Multi-Token Prediction) draft model configuration
# Gemma 4 uses assistant models for speculative decoding via MTP.
# draft_max = number of MTP tokens to predict per step (default: 3)
# draft_p_min = minimum probability threshold for accepting draft tokens
draft_max: 3
draft_p_min: 0.0

notes: >
  Gemma 4 (Release 02.04.2026, Apache 2.0) - vier Größen unter
  einer Architektur:
    E2B / E4B   - mobile/edge, 128k Kontext, multimodal Text+Bild+Audio
    26B-A4B     - MoE mit 3.8B aktiven Parametern, 256k, Text+Bild
    31B Dense   - Workstation-Modell, 256k, Text+Bild
  Gemma reagiert empfindlich auf repeat_penalty > 1.0 (NICHT erhöhen).
  Neu in Gemma 4: native System-Prompt-Role, konfigurierbare Thinking-
  Modi, und MTP-Drafter für alle vier Größen (~3x Speedup via Speculative
  Decoding). Thinking-Modus aktivierbar durch <|think|> am Anfang des
  System-Prompts.
  Tipp: Manche Community-Tests zeigen, dass Gemma 4 für Coding sogar mit
  temp=1.5 besser performt - bei Bedarf mit `-- --temp 1.5` überschreiben.
