display_name: "Gemma 4 (Google)"
patterns:
  - gemma-4
  - gemma4

# E2B/E4B unterstützen 131072 (128k); 26B-A4B und 31B bis 262144 (256k).
# Wird automatisch via GGUF-Metadata (native_context) je nach Modell
# heruntergeregelt - daher hier den größten Wert eintragen.
max_context: 262144
recommended_kv_quant: q8_0

# Zwingend erforderlich für MTP-Support (gemma4_mtp Architektur)
server_binary: "ik_llama.cpp/build/bin/Release/llama-server.exe"

sampling:
  # Google's offizielle Empfehlung über alle Größen hinweg.
  temperature: 1.0
  top_k: 64
  top_p: 0.95
  min_p: 0.0
  repeat_penalty: 1.0  # Gemma reagiert schlecht auf >1.0

# MTP (Multi-Token Prediction) draft model configuration
# Gemma 4 uses assistant models for speculative decoding via MTP.
# draft_max = number of MTP tokens to predict per step (default: 3)
# draft_p_min = minimum probability threshold for accepting draft tokens
draft_max: 3
draft_p_min: 0.0

notes: >
  Gemma ist empfindlich gegenüber repeat_penalty > 1.0.
  E2B/E4B = multimodal (Text+Bild+Audio), 26B-A4B + 31B = Text+Bild.
  Thinking-Modus aktivierbar durch <|think|> am Anfang des System-Prompts.
  Tipp: Manche Community-Tests zeigen, dass Gemma 4 für Coding sogar mit
  temp=1.5 besser performt - bei Bedarf mit `-- --temp 1.5` überschreiben.