display_name: "DiffusionGemma (diffusion LLM)"
patterns:
  - diffusiongemma
  - diffusion-gemma

# Architektur-Fallback: greift wenn KEIN Pattern oben matcht. Die
# general.architecture dieser GGUFs ist "diffusion-gemma" (fork-only,
# NICHT in llama.cpp-Mainline b9700). Der Scanner erkennt sie ohnehin als
# Diffusionsmodell (is_diffusion -> True) und der Launcher schaltet
# automatisch auf llama-diffusion-cli um; der Fallback ist hier zur
# Sicherheit, falls eine Variante einen unüblichen Dateinamen trägt.
arch_fallback:
  - diffusion-gemma
  - diffusion_gemma
  - diffusiongemma

# WICHTIG — Runner: DiffusionGemma läuft ab PR #24427 über einen
# EIGENEN OpenAI-kompatiblen HTTP-Server (llama-diffusion-gemma-server):
# /health, /v1/chat/completions, /props, Port, API-Key — wie llama-server,
# aber mit Diffusions-Sampling-Pfad. Damit ist der Server persistent
# abfragbar (Chat-UI, RooCode, etc.), nicht mehr single-shot.
# Mainline-Diffusionsmodelle (Dream/LLaDA/RND1) ohne eigenen Server nutzen
# stattdessen runner: llama-diffusion-cli (single-shot). Der Scanner
# erkennt die Architektur automatisch; dieses Feld macht es explizit.
runner: llama-diffusion-gemma-server

# Binary: KEIN server_binary/Pfad hier eintragen. llama-diffusion-cli wird
# automatisch in dem llama.cpp-Build gesucht, den du im Fork-Dropdown der
# GUI auswählst (bzw. unter LLAMA_CPP_DIR). Wähle einfach deinen
# diffusionsfähigen Build (z.B. "d_b9654_llama.cpp") im Dropdown — der
# AutoTuner findet darin build/bin/[Release/]llama-diffusion-cli. So musst
# du bei jedem neuen Compile NICHTS am Code/Profil ändern.
#
# Nur falls du einen Diffusions-Build an einen FESTEN, vom Dropdown
# abweichenden Ort zwingen willst, kannst du optional server_binary auf
# "<fork-ordnername>/llama-diffusion-cli" setzen — normalerweise NICHT nötig.

# Native Kontextlänge: wird via GGUF-Metadata automatisch gecappt; hier der
# Familien-Maximalwert (diffusiongemma-26B-A4B-it). HINWEIS: DiffusionGemma
# generiert in 256-Token-Blöcken (canvas_length=256) — selbst mit
# Prompt+Ausgabe reicht ein moderater Kontext. 262144 ist das
# Modell-Maximum; der KV-Cache (k/v_length=512, 30 Layer) wächst dabei auf
# ~30 GiB, was auf 16-GB-Vulkan-Karten crash ("failed to allocate Vulkan0
# buffer of size 1073741824"). compute_config deckelt den Kontext anhand der
# echten F16-KV-Schätzung automatisch nach unten. 4096 ist der sichere
# Auto-Wert (KV ~0,47 GiB); 8192 erreicht mit Allocator-Overhead eine
# zusammenhängende ~1-GiB-Vulkan-Allokation und kann trotz freiem Gesamt-VRAM
# scheitern. Größere explizite Context-Pins bleiben für HIP-Builds möglich.
max_context: 4096

# Diffusions-Parameter (nur auf dem Diffusionspfad ausgewertet). Mapping auf
# die b9672-Mainline-Flags:
#   steps        -> --diffusion-steps        (Anzahl Denoising-Schritte)
#   algorithm    -> --diffusion-algorithm    (0..4; "confidence" = 4 = Default)
#   eps          -> --diffusion-eps          (Timestep-Scheduling)
#   block_length -> --diffusion-block-length (Block-Scheduling; ENTWEDER eps
#                   ODER block_length, nicht beides)
#   visual       -> --diffusion-visual       (Live-Visualisierung der Tokens)
#   n_predict    -> -n                       (max. zu generierende Tokens)
diffusion:
  # steps: Doku-Empfehlung max 48 (adaptives Early-Stop meist bei 12-16).
  # 256 war zu hoch und nur Langsamkeit ohne Qualitäts-Gewinn.
  steps: 48
  algorithm: confidence   # 0=origin 1=entropy 2=margin 3=random 4=confidence
  block_length: 32        # Block-Scheduling (Gemma-Diffusion nutzt Blöcke)
  visual: false
  n_predict: 2048

  # Fork-only Extras: NICHT in mainline b9700. Der DiffusionGemma-Fork kennt
  # zusätzliche Flags (entropy-bounding, KV-Cache für Diffusion). Werden
  # verbatim ans CLI angehängt. Auskommentiert lassen, wenn dein Fork sie
  # nicht unterstützt — sonst bricht der Start mit "unknown argument" ab.
  # Einkommentieren, sobald dein d_b96...-Build sie hat:
  # fork_args:
  #   - --diffusion-eb
  #   - --diffusion-kv-cache

# Sampling: Diffusion-CLI honoriert --temp (und --top-k/--top-p). Für
# Gemma-Diffusion ist eine moderate Temperatur sinnvoll; der Builder zieht
# temperature aus dem chat-Block.
sampling:
  chat:
    temperature: 0.7
  coding:
    temperature: 0.3

notes: >
  DiffusionGemma ist ein Diffusions-Textmodell (kein autoregressives GGUF
  für den normalen llama-server). Es läuft über llama-diffusion-gemma-server
  (PR #24427) — einen EIGENEN OpenAI-kompatiblen HTTP-Server mit /health,
  /v1/chat/completions, /props und Port-Binding. Wähle deinen Diffusion-
  Build im Fork-Dropdown der GUI (z.B. "d_b9781_llama.cpp" oder den
  HIP-Build "d_bXXXX_hip_llama.cpp"); der AutoTuner findet
  llama-diffusion-gemma-server automatisch darin, kein Pfad muss hartcodiert
  werden. Der Server ist persistent abfragbar (Chat-UI, RooCode, OpenAI-
  Clients) — Port/Zustand wie bei jedem anderen Server. Mainline b9700
  ertechnet die Architektur "diffusion-gemma" nicht; der AutoTuner erkennt
  sie trotzdem (is_diffusion) und wählt automatisch den gemma-server-Runner.
  Mainline-Diffusionsmodelle (Dream/LLaDA/RND1) haben KEINEN eigenen Server
  und laufen stattdessen single-shot über llama-diffusion-cli. Scheduling:
  ENTWEDER --diffusion-eps ODER --diffusion-block-length, nicht beides
  (DiffusionGemma nutzt Block-Scheduling). Fork-spezifische Flags müssen
  über diffusion.fork_args zugeschaltet werden, falls dein Build sie kennt.
  WICHTIG VRAM: DiffusionGemma hat einen extrem großen F16-KV-Cache
  (k/v_length=512, 5x normal). Auto ist daher auf 4096 gedeckelt
  (KV ~0,47 GiB); 8192 kann mit Allocator-Overhead eine zusammenhängende
  1-GiB-Vulkan-Allokation erreichen und trotz freiem Gesamt-VRAM crashen.
  Die Rechnung reserviert außerdem 1,5 GiB Diffusions-Runtime-Overhead.
  Pinnen auf die 32-GB-R9700 geschieht automatisch (env_overrides).
