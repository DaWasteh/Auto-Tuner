display_name: "LFM2 / LFM2.5 (LiquidAI)"
patterns:
  - lfm2
  - lfm-2

# LiquidAI LFM2 / LFM2.5 (general.architecture = "lfm2"). Kurz-Conv +
# GQA-Hybrid - in llama.cpp-Mainline unterstützt; seit Feb 2026 gibt es
# zusätzlich den LFM2-basierten Audio-Tokenizer für die Audio-Varianten.
# LFM2.5-Audio-1.5B meldet native_context = 128000 (wird via GGUF-Metadata
# gecappt - hier den nächstgrößeren Standardwert).
max_context: 131072
recommended_kv_quant: q8_0

# Sampling-Profile pro Modus.
sampling:
  chat:
    # LiquidAI's offizielle LFM2-Empfehlung: temp=0.3, min_p=0.15,
    # repetition_penalty=1.05. Die Modelle sind klein (1.2B/1.5B) und
    # neigen bei hoher Temperatur schnell zu Inkohärenz.
    temperature: 0.3
    top_k: 40
    top_p: 0.95
    min_p: 0.15
    repeat_penalty: 1.05
  coding:
    # Noch deterministischer für strukturierte/wiederholbare Ausgaben.
    temperature: 0.15
    top_k: 40
    top_p: 0.9
    min_p: 0.1
    repeat_penalty: 1.05

notes: >
  LiquidAI LFM2 / LFM2.5 Edge-Familie (Kurz-Conv + GQA). Sampling entspricht
  LiquidAI's offizieller Empfehlung (temp 0.3, min_p 0.15, rep 1.05) - kleine
  Modelle, daher bewusst niedrige Temperatur gegen Inkohärenz.
  WICHTIG (LFM2.5-Audio): Das ist ein Audio-In/Audio-Out-Sprachmodell. Dieses
  Profil liefert nur sinnvolle Text-seitige Defaults - die eigentliche
  Audio-Pipeline (Audio-Encoder/Decoder) läuft über die dedizierten
  llama.cpp-Audio-Pfade, nicht über den reinen Text-Chat-Server. Als
  Text-Chat-Modell geladen funktioniert es, gibt aber keine Sprache aus.
  LFM2 ist technisch ein Conv/Attention-Hybrid; bei diesem 1.5B-Modell ist
  die KV-Cache-Überschätzung des Tuners vernachlässigbar (winziges Modell).
