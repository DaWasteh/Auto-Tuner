name: Release

# Build the noconsole AutoTuner binaries (Windows .exe + Linux + macOS), verify
# the Linux binary on Ubuntu, Fedora, Arch, Mint, CachyOS, Kali, and Debian, and
# publish them as downloadable, zipped GitHub-Release assets. The per-OS zips serve
# BOTH the beginner download ("entpacken und doppelklicken") AND the in-app
# auto-update (the _BinaryUpdateWorker downloads the zip and extracts the
# binary, then swaps it).
#
# Trigger: push a tag matching `v<VERSION>` where VERSION lives in
# autotuner_version.py  (e.g. VERSION = "1.2.0"  →  git tag v1.2.0).
# A manual `workflow_dispatch` run builds a draft release you can publish.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      draft:
        description: "Create as draft release (edit + publish manually)"
        required: false
        default: "true"

permissions:
  contents: write   # required to create the release + upload assets

jobs:
  build:
    name: Build (${{ matrix.os-label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            os-label: Windows
            artifact: AutoTuner-Windows-x64.zip
          - runner: ubuntu-latest
            os-label: Linux
            artifact: AutoTuner-Linux-x64.zip
          - runner: macos-latest
            os-label: macOS
            artifact: AutoTuner-macOS.zip

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Read AutoTuner version
        id: ver
        shell: bash
        run: echo "version=$(python -c 'from autotuner_version import VERSION; print(VERSION)')" >> $GITHUB_OUTPUT

      # Frozen PyQt6 on Linux needs the X/EGL/Qt platform stack present at
      # build time (PyInstaller records which xcb plugins to bundle).
      - name: Install Linux Qt runtime libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libgl1 libglib2.0-0 libfontconfig1 libdbus-1-3 \
            libxkbcommon0 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-sync1 libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1

      - name: Install dependencies + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary
        run: python build_exe.py

      - name: Stage zip contents (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stage = "stage/AutoTuner"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item dist/AutoTuner.exe $stage/
          @"
          AutoTuner v${{ steps.ver.outputs.version }}  (Windows 10/11)

          1. Entpacke diese ZIP an einen beliebigen Ort.
          2. Doppelklicke AutoTuner.exe.
          3. Updates holst du später einfach oben in der Toolbar ueber den
             Update-Button. Deine Einstellungen (autotuner_settings.json)
             bleiben erhalten.
          "@ | Set-Content -Encoding UTF8 "$stage/LiesMich - AutoTuner.txt"
          Compress-Archive -Path "stage/AutoTuner/*" -DestinationPath ${{ matrix.artifact }} -Force

      - name: Stage zip contents (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p stage/AutoTuner
          cp dist/AutoTuner-Linux stage/AutoTuner/
          cat > "stage/AutoTuner/LiesMich - AutoTuner.txt" <<EOF
          AutoTuner v${{ steps.ver.outputs.version }}  (Linux)

          Getestet auf Ubuntu, Fedora, Arch Linux, Linux Mint, CachyOS,
          Kali Linux und Debian.

          1. Entpacke diese ZIP an einen beliebigen Ort.
          2. chmod +x AutoTuner-Linux  &&  ./AutoTuner-Linux
          3. Updates holst du später einfach oben in der Toolbar ueber den
             Update-Button. Deine Einstellungen bleiben erhalten.
          EOF
          (cd stage && zip -r ../${{ matrix.artifact }} AutoTuner)

      - name: Stage zip contents (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p stage/AutoTuner
          if [ -d dist/AutoTuner-macOS.app ]; then
            cp -R dist/AutoTuner-macOS.app stage/AutoTuner/
            launch_hint='open AutoTuner-macOS.app'
          else
            cp dist/AutoTuner-macOS stage/AutoTuner/
            chmod +x stage/AutoTuner/AutoTuner-macOS
            launch_hint='./AutoTuner-macOS'
          fi
          cat > "stage/AutoTuner/ReadMe - AutoTuner.txt" <<EOF
          AutoTuner v${{ steps.ver.outputs.version }}  (macOS)

          1. Entpacke diese ZIP an einen beliebigen Ort.
          2. Starte AutoTuner mit: $launch_hint
          3. Updates holst du später einfach oben in der Toolbar ueber den
             Update-Button. Deine Einstellungen bleiben erhalten.
          EOF
          (cd stage && zip -r ../${{ matrix.artifact }} AutoTuner)

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 14

  # A single Linux release asset keeps the in-app updater simple. Before it is
  # published, launch that exact frozen binary in every supported distro image.
  verify-linux-distros:
    name: Verify Linux binary (${{ matrix.name }})
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu
            image: ubuntu:latest
          - name: Fedora
            image: fedora:latest
          - name: Arch Linux
            image: archlinux:latest
          - name: Linux Mint 22.3
            image: linuxmintd/mint22.3-amd64:latest
          - name: CachyOS
            image: cachyos/cachyos:latest
          - name: Kali Linux
            image: kalilinux/kali-rolling:latest
          - name: Debian stable
            image: debian:stable

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux build artifact
        uses: actions/download-artifact@v4
        with:
          name: AutoTuner-Linux-x64.zip
          path: artifacts

      - name: Pull ${{ matrix.name }} container
        run: docker pull "${{ matrix.image }}"

      - name: Launch release binary on ${{ matrix.name }}
        run: |
          docker run --rm \
            --volume "$GITHUB_WORKSPACE:/workspace:ro" \
            --volume "$GITHUB_WORKSPACE/artifacts:/artifacts:ro" \
            "${{ matrix.image }}" \
            bash /workspace/.github/scripts/linux-distro-ci.sh \
              binary /artifacts/AutoTuner-Linux-x64.zip

  release:
    name: Publish GitHub Release
    needs: [build, verify-linux-distros]
    runs-on: ubuntu-latest
    # workflow_dispatch always runs; tag pushes only when the tag matches v<VERSION>.
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Read AutoTuner version
        id: ver
        run: echo "version=$(python -c 'from autotuner_version import VERSION; print(VERSION)')" >> $GITHUB_OUTPUT

      - name: Sanity-check tag matches version (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          expected="v${{ steps.ver.outputs.version }}"
          echo "tag=$tag  expected=$expected"
          if [ "$tag" != "$expected" ]; then
            echo "::error::Git tag '$tag' does not match autotuner_version.VERSION '${{ steps.ver.outputs.version }}' (expected '$expected'). The in-app updater compares tag_name to VERSION, so they must match."
            exit 1
          fi

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true

      - name: List assets
        run: ls -la assets/

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: AutoTuner v${{ steps.ver.outputs.version }}
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          prerelease: false
          generate_release_notes: true
          files: |
            assets/AutoTuner-Windows-x64.zip
            assets/AutoTuner-Linux-x64.zip
            assets/AutoTuner-macOS.zip
          body: |
            ## AutoTuner v${{ steps.ver.outputs.version }}

            **Download für Einsteiger:** die passende ZIP holen, entpacken, Doppelklick.

            | OS | Datei |
            | -- | ----- |
            | Windows 10/11 | `AutoTuner-Windows-x64.zip` (→ `AutoTuner.exe`) |
            | Linux (Ubuntu, Fedora, Arch, Mint, CachyOS, Kali, Debian) | `AutoTuner-Linux-x64.zip` (→ `AutoTuner-Linux`) |
            | macOS | `AutoTuner-macOS.zip` (→ `AutoTuner-macOS.app` or `AutoTuner-macOS`) |

            In der kompilierten Version funktioniert der **Update-Button**:
            er lädt automatisch das zum OS passende Release-ZIP und tauscht
            das Binary nach Neustart aus. Deine Einstellungen
            (`autotuner_settings.json`) bleiben erhalten.

            ---
            Änderungen siehe unten (auto-generierte Release Notes).
